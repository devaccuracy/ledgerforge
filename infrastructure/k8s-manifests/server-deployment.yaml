apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o k8s-manifests/
    kompose.version: 1.26.1 (a9d05d509)
  creationTimestamp: null
  labels:
    io.kompose.service: server
  name: server
  namespace: ledgerforge
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o k8s-manifests/
        kompose.version: 1.26.1 (a9d05d509)
      creationTimestamp: null
      labels:
        io.kompose.service: server
    spec:
      containers:
        - args:
            - ledgerforge migrate up --config /ledgerforge.json && ledgerforge start --config /ledgerforge.json
          command:
            - /bin/sh
            - -c
          env:
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://jaeger:4318/v1/traces
            - name: TZ
              value: Etc/UTC
          image: ghcr.io/devaccuracy/ledgerforge:main
          name: server
          ports:
            - containerPort: 5001
            - containerPort: 80
            - containerPort: 443
          resources: {}
          volumeMounts:
            - name: ledgerforge-config
              mountPath: /ledgerforge.json
              subPath: ledgerforge.json
      restartPolicy: Always
      volumes:
        - name: ledgerforge-config
          configMap:
            name: ledgerforge-config
status: {}

apiVersion: v1
kind: ConfigMap
metadata:
  name: ledgerforge-config
  namespace: ledgerforge
data:
  ledgerforge.json: |
    {
      "project_name": "LedgerForge",
      "data_source": {
        "dns": "postgres://postgres:password@postgres:5432/ledgerforge?sslmode=disable"
      },
      "redis": {
        "dns": "redis:6379"
      },
      "server": {
        "port": "5001"
      }
    }